<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake News AI</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f2f2f7;
}

/* 📱 контейнер */
.container {
    padding: 20px;
}

/* 🧠 заголовок */
.header {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 20px;
}

/* 📝 карточка */
.card {
    background: white;
    border-radius: 16px;
    padding: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    margin-bottom: 15px;
}

/* ✍️ textarea */
textarea {
    width: 100%;
    height: 120px;
    border: none;
    outline: none;
    font-size: 16px;
    resize: none;
}

/* 🍏 кнопка */
.button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #007AFF;
    color: white;
    font-size: 17px;
    font-weight: 500;
    margin-top: 10px;
}

/* 📊 результат */
.result {
    font-size: 16px;
    line-height: 1.4;
}

/* ✨ анимация */
.fade {
    animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px);}
    to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">

    <div class="header">🧠 Fake News AI</div>

    <div class="card">
        <textarea id="text" placeholder="Вставь новость или ссылку..."></textarea>
        <button class="button" onclick="check()">Проверить</button>
    </div>

    <div id="resultBox" class="card fade" style="display:none;">
        <div id="result" class="result"></div>
    </div>

</div>

<script>
async function check() {
    const text = document.getElementById("text").value;

    if (!text) return;

    document.getElementById("resultBox").style.display = "block";
    document.getElementById("result").innerText = "⏳ Проверяем...";

    try {
        const res = await fetch("/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ text })
        });

        const data = await res.json();

        document.getElementById("result").innerText = data.result;

    } catch {
        document.getElementById("result").innerText = "❌ Ошибка соединения";
    }
}
</script>

</body>
</html>
